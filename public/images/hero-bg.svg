  <circle cx="400" cy="680" r="5" fill="#A5B580" fill-opacity="0.2"/>
  <circle cx="680" cy="140" r="4" fill="#A5B580" fill-opacity="0.25"/>
  <circle cx="1180" cy="280" r="6" fill="#FF8562" fill-opacity="0.2"/>
  <circle cx="1620" cy="180" r="4" fill="#A5B580" fill-opacity="0.2"/>
  <circle cx="230" cy="920" r="5" fill="#A5B580" fill-opacity="0.15"/>
