  <path d="M0,780 Q480,680 960,730 T1920,800" fill="none" stroke="#A5B580" stroke-opacity="0.08" stroke-width="1.5"/>
  <path d="M0,850 Q480,750 960,800 T1920,870" fill="none" stroke="#8A9B6A" stroke-opacity="0.05" stroke-width="1"/>
