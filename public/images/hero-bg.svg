  <ellipse cx="150" cy="700" rx="60" ry="120" fill="#A5B580" fill-opacity="0.04" transform="rotate(-20, 150, 700)"/>
  <ellipse cx="1750" cy="300" rx="50" ry="100" fill="#A5B580" fill-opacity="0.03" transform="rotate(25, 1750, 300)"/>
