<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6E7F4E"/>
      <stop offset="50%" stop-color="#5A6B42"/>
      <stop offset="100%" stop-color="#4A5838"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8562"/>
      <stop offset="100%" stop-color="#FF6B47"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="540" cy="90" r="110" fill="rgba(255,255,255,0.03)"/>
  <circle cx="60" cy="310" r="95" fill="rgba(255,255,255,0.03)"/>
  <circle cx="300" cy="180" r="70" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Device/CPU icon -->
  <g transform="translate(255, 135)" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="15" y="15" width="60" height="60" rx="8"/>
    <rect x="30" y="30" width="30" height="30" rx="4" fill="url(#accent)" stroke="none" opacity="0.8"/>
    <line x1="45" y1="5" x2="45" y2="15"/>
    <line x1="30" y1="5" x2="30" y2="15"/>
    <line x1="60" y1="5" x2="60" y2="15"/>
    <line x1="45" y1="75" x2="45" y2="85"/>
    <line x1="30" y1="75" x2="30" y2="85"/>
    <line x1="60" y1="75" x2="60" y2="85"/>
    <line x1="5" y1="45" x2="15" y2="45"/>
    <line x1="75" y1="45" x2="85" y2="45"/>
  </g>
  <text x="300" y="290" font-family="Georgia, serif" font-size="22" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="500">Аппаратные процедуры</text>
  <text x="300" y="320" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Современное оборудование</text>
</svg>