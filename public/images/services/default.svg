<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="50%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <radialGradient id="neutralGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  <rect width="800" height="600" fill="url(#neutralGlow)"/>
  <!-- Generic placeholder icon: image frame -->
  <rect x="320" y="220" width="160" height="160" rx="8" fill="none" stroke="#888888" stroke-opacity="0.2" stroke-width="2"/>
  <!-- Mountain/landscape placeholder icon -->
  <polygon points="350,350 400,280 450,350" fill="#888888" fill-opacity="0.08"/>
  <polygon points="380,350 420,300 460,350" fill="#888888" fill-opacity="0.06"/>
  <!-- Sun circle -->
  <circle cx="430" cy="260" r="15" fill="#888888" fill-opacity="0.08"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="50" fill="none" stroke="#999999" stroke-opacity="0.07" stroke-width="1"/>
  <circle cx="620" cy="440" r="55" fill="none" stroke="#999999" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="650" cy="140" r="30" fill="#999999" fill-opacity="0.03"/>
  <circle cx="140" cy="460" r="35" fill="#999999" fill-opacity="0.03"/>
  <!-- Grid dots suggesting content -->
  <circle cx="260" cy="480" r="3" fill="#888888" fill-opacity="0.1"/>
  <circle cx="540" cy="120" r="3" fill="#888888" fill-opacity="0.1"/>
  <circle cx="680" cy="300" r="2" fill="#888888" fill-opacity="0.12"/>
  <circle cx="120" cy="280" r="2" fill="#888888" fill-opacity="0.12"/>
</svg>
