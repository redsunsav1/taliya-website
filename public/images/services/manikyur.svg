<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8C9D6D"/>
      <stop offset="50%" stop-color="#76875A"/>
      <stop offset="100%" stop-color="#617148"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8562"/>
      <stop offset="100%" stop-color="#FF6B47"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="505" cy="80" r="110" fill="rgba(255,255,255,0.03)"/>
  <circle cx="95" cy="330" r="95" fill="rgba(255,255,255,0.03)"/>
  <circle cx="300" cy="180" r="70" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Nail polish bottle icon -->
  <g transform="translate(260, 135)" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="25" y="30" width="40" height="55" rx="5"/>
    <rect x="30" y="5" width="30" height="25" rx="3"/>
    <line x1="45" y1="5" x2="45" y2="0"/>
    <rect x="30" y="40" width="30" height="35" rx="3" fill="url(#accent)" stroke="none" opacity="0.8"/>
    <path d="M35 55 Q45 50 55 55" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <circle cx="40" cy="65" r="3" fill="#fff" opacity="0.5"/>
    <!-- Sparkles -->
    <circle cx="15" cy="20" r="3" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <circle cx="75" cy="40" r="2" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
  </g>
  <text x="300" y="290" font-family="Georgia, serif" font-size="22" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="500">Маникюр и педикюр</text>
  <text x="300" y="320" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Японские техники и дизайн</text>
</svg>