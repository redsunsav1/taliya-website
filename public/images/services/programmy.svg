<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7E8F5F"/>
      <stop offset="50%" stop-color="#697A50"/>
      <stop offset="100%" stop-color="#556543"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8562"/>
      <stop offset="100%" stop-color="#FF6B47"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <circle cx="515" cy="75" r="115" fill="rgba(255,255,255,0.03)"/>
  <circle cx="85" cy="340" r="100" fill="rgba(255,255,255,0.03)"/>
  <circle cx="300" cy="180" r="70" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <!-- Package/grid icon -->
  <g transform="translate(255, 135)" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="10" y="10" width="70" height="70" rx="6"/>
    <line x1="10" y1="45" x2="80" y2="45"/>
    <line x1="45" y1="10" x2="45" y2="80"/>
    <rect x="14" y="14" width="27" height="27" rx="2" fill="url(#accent)" stroke="none" opacity="0.8"/>
    <circle cx="59" cy="28" r="5" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
    <rect x="50" y="54" width="22" height="18" rx="2" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  </g>
  <text x="300" y="290" font-family="Georgia, serif" font-size="22" fill="rgba(255,255,255,0.9)" text-anchor="middle" font-weight="500">Готовые программы</text>
  <text x="300" y="320" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.6)" text-anchor="middle">Комплексные решения для лица и тела</text>
